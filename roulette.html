<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Roulette Manager</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #ffb703; --green: #008151; --dark: #1a1a2e; --white: #efefef; --red: #e63946; }
        body { font-family: sans-serif; background: var(--dark); color: var(--white); text-align: center; padding: 20px; margin: 0; }
        .card { background: #16213e; padding: 20px; border-radius: 15px; max-width: 450px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .hidden { display: none; }
        input, button, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        #qrcode { background: white; padding: 10px; display: inline-block; margin: 15px 0; }
        .player-item { background: rgba(255,255,255,0.1); padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .status-ready { color: var(--green); font-weight: bold; }
        .win-flash { color: var(--gold); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity:1; } 50% { opacity:0.3; } 100% { opacity:1; } }
    </style>
</head>
<body>

    <div id="view-start" class="card">
        <h1>Roulette Multi</h1>
        <button onclick="showHostSetup()">親（ディーラー）として開始</button>
        <button onclick="showClientLogin()">子（プレイヤー）として参加</button>
    </div>

    <div id="view-host-setup" class="card hidden">
        <h2>親：ルーム作成</h2>
        <label>参加人数（子）</label>
        <input type="number" id="host-limit" value="3">
        <label>初期所持金（全員一律）</label>
        <input type="number" id="host-initial-money" value="10000">
        <button onclick="createRoom()">ルーム作成＆QR表示</button>
    </div>

    <div id="view-host-waiting" class="card hidden">
        <h2>参加待機中</h2>
        <div id="qrcode"></div>
        <div style="font-size: 0.9rem; margin-bottom: 5px;">Password:</div>
        <div id="display-pw" style="font-size: 2.5rem; color: var(--gold); font-weight: bold;">----</div>
        <hr>
        <p>参加中のプレイヤー (<span id="current-count">0</span> / <span id="target-count">0</span>)</p>
        <div id="host-player-list"></div>
        <button id="btn-start-game" onclick="startGame()" disabled>全員揃ったらゲーム開始</button>
    </div>

    <div id="view-host-game" class="card hidden">
        <h2>ディーラー画面</h2>
        <div id="host-player-bets" style="text-align:left; margin-bottom:20px;"></div>
        <hr>
        <h3>当選番号を入力</h3>
        <input type="number" id="winning-number" min="0" max="36" placeholder="0-36">
        <button onclick="settleGame()" style="background:var(--red); color:white;">結果を確定・配当計算</button>
    </div>

    <div id="view-client-login" class="card hidden">
        <h2>プレイヤー参加</h2>
        <input type="number" id="login-pw" placeholder="4桁のパスワード">
        <input type="text" id="login-name" placeholder="プレイヤー名">
        <button onclick="joinRoom()">準備完了（接続）</button>
    </div>

    <div id="view-client-waiting" class="card hidden">
        <h2>接続完了！</h2>
        <p>ディーラーが開始するまでお待ちください...</p>
        <div style="font-size: 1.2rem; color: var(--gold);">
            Name: <span id="my-name-disp"></span><br>
            Balance: ¥<span id="my-money-disp"></span>
        </div>
        <div style="margin-top: 20px; font-size: 3rem; animation: spin 2s linear infinite;">🎲</div>
    </div>

    <div id="view-client-game" class="card hidden">
        <h3>残高: ¥<span id="game-balance">0</span></h3>
        <div id="betting-board">
            <p>賭け方を選択</p>
            <select id="client-bet-type">
                <option value="36">1点賭け (36倍)</option>
                <option value="2">赤黒 (2倍)</option>
            </select>
            <input type="number" id="client-bet-amount" placeholder="賭け金">
            <button onclick="placeBet()" id="btn-bet-confirm" style="background:var(--green); color:white;">ベットを確定する</button>
        </div>
        <div id="my-bet-status" style="margin-top:20px; min-height: 40px;"></div>
    </div>

    <script>
        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCV0aWNuuWfoku9yXyWf8a6Ru036CpD6BU",
            authDomain: "roulette2-18bd3.firebaseapp.com",
            databaseURL: "https://roulette2-18bd3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "roulette2-18bd3",
            storageBucket: "roulette2-18bd3.firebasestorage.app",
            messagingSenderId: "527520888855",
            appId: "1:527520888855:web:5290b68c5a4fb7b8038452"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let roomId = "main-room"; 
        let myId = "";
        const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        function showView(id) {
            document.querySelectorAll('div[id^="view-"]').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- 親の処理 ---
        function showHostSetup() { showView('view-host-setup'); }

        function createRoom() {
            const limit = document.getElementById('host-limit').value;
            const initial = document.getElementById('host-initial-money').value;
            const pw = Math.floor(1000 + Math.random() * 9000).toString();

            db.ref(roomId).set({
                config: { limit: parseInt(limit), initial: parseInt(initial), pw: pw, status: 'waiting' },
                players: {}
            });

            document.getElementById('display-pw').innerText = pw;
            document.getElementById('target-count').innerText = limit;
            
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 150, height: 150 });
            showView('view-host-waiting');
            listenPlayers();
        }

        function listenPlayers() {
            db.ref(`${roomId}/players`).on('value', (snapshot) => {
                const players = snapshot.val() || {};
                const listDiv = document.getElementById('host-player-list');
                listDiv.innerHTML = "";
                let count = 0;
                Object.keys(players).forEach(id => {
                    count++;
                    const p = players[id];
                    listDiv.innerHTML += `<div class="player-item">${p.name} <span class="status-ready">READY</span></div>`;
                });
                document.getElementById('current-count').innerText = count;
                const limit = document.getElementById('host-limit').value;
                document.getElementById('btn-start-game').disabled = (count < parseInt(limit));
            });
        }

        function startGame() {
            db.ref(`${roomId}/config`).update({ status: 'playing' });
            showView('view-host-game');
            // 親側のベット状況監視
            db.ref(`${roomId}/players`).on('value', (snapshot) => {
                const players = snapshot.val() || {};
                const container = document.getElementById('host-player-bets');
                container.innerHTML = "<h4>現在のベット状況:</h4>";
                Object.keys(players).forEach(id => {
                    const p = players[id];
                    const bet = p.currentBet ? `¥${p.currentBet.amount} (${p.currentBet.type}倍)` : "検討中...";
                    container.innerHTML += `<div class="player-item">${p.name}: ${bet} <span class="balance-val">¥${p.balance}</span></div>`;
                });
            });
        }

        async function settleGame() {
            const winNum = parseInt(document.getElementById('winning-number').value);
            if (isNaN(winNum)) return alert("当選番号を入力してください");

            const snap = await db.ref(`${roomId}/players`).once('value');
            const players = snap.val();

            for (let id in players) {
                let p = players[id];
                if (p.currentBet) {
                    let payout = 0;
                    // 超簡易判定: 2倍(赤黒)なら「winNumが赤かつ赤に賭けた」等を判定
                    // 今回は1点or2倍の倍率のみ連動
                    if (confirm(`${p.name} (賭け:${p.currentBet.amount}円) は当たりですか？`)) {
                        payout = p.currentBet.amount * p.currentBet.type;
                    }
                    db.ref(`${roomId}/players/${id}`).update({
                        balance: p.balance + payout,
                        currentBet: null,
                        lastWin: payout
                    });
                }
            }
            alert("配当を反映しました");
        }

        // --- 子の処理 ---
        function showClientLogin() { showView('view-client-login'); }

        async function joinRoom() {
            const pwIn = document.getElementById('login-pw').value;
            const name = document.getElementById('login-name').value;
            const snap = await db.ref(`${roomId}/config`).once('value');
            const config = snap.val();

            if (config && config.pw === pwIn && name !== "") {
                const ref = db.ref(`${roomId}/players`).push();
                myId = ref.key;
                ref.set({ name: name, balance: parseInt(config.initial), currentBet: null });

                document.getElementById('my-name-disp').innerText = name;
                document.getElementById('my-money-disp').innerText = config.initial;
                showView('view-client-waiting');

                // ゲーム開始と更新の監視
                db.ref(`${roomId}/config/status`).on('value', (s) => {
                    if(s.val() === 'playing') showView('view-client-game');
                });
                db.ref(`${roomId}/players/${myId}`).on('value', (s) => {
                    const p = s.val();
                    document.getElementById('game-balance').innerText = p.balance;
                    if(p.lastWin > 0) document.getElementById('my-bet-status').innerHTML = `<span class="win-flash">当たり！ ¥${p.lastWin} 獲得！</span>`;
                    else if(p.lastWin === 0) document.getElementById('my-bet-status').innerText = "はずれ...";
                });
            } else { alert("パスワードが違うか、入力が不十分です"); }
        }

        function placeBet() {
            const amt = parseInt(document.getElementById('client-bet-amount').value);
            const type = parseInt(document.getElementById('client-bet-type').value);
            const bal = parseInt(document.getElementById('game-balance').innerText);

            if (isNaN(amt) || amt <= 0 || amt > bal) return alert("正しい金額を入力してください");

            db.ref(`${roomId}/players/${myId}`).update({
                currentBet: { amount: amt, type: type },
                balance: bal - amt,
                lastWin: -1 
            });
            document.getElementById('my-bet-status').innerText = "ベット完了。結果待ち...";
        }
    </script>
</body>
</html>
